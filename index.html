<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wedding Guest Message</title>

  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(180deg, #ffe8d6 0%, #fffaf5 35%, #e8f4ff 100%);
      background-attachment: fixed;
    }

    .photo-frame {
      border: 4px solid #fff;
      box-shadow: 0 8px 32px rgba(180,83,9,0.3);
    }
  </style>
</head>

<body class="min-h-screen w-full">

  <!-- Hero Section -->
  <section class="relative w-full h-[45vh] sm:h-[50vh] overflow-hidden">
    <img
      class="absolute inset-0 w-full h-full object-cover"
      src="https://images.pexels.com/photos/28689259/pexels-photo-28689259.jpeg"
      alt="Orange dahlias"
    >
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-white/40 to-white"></div>
  </section>

  <!-- Main Content -->
  <div class="max-w-xl mx-auto px-5 -mt-14 relative z-10 text-center pb-16">

    <h1 class="mb-1 text-[28px] sm:text-[32px] text-amber-800">Rintaro & Honami</h1>
    <p class="tracking-[0.25em] mb-6 text-amber-600 font-medium text-sm sm:text-base">
      2026.10.11
    </p>

    <p class="leading-relaxed mb-10 text-amber-900 text-[15px] sm:text-[16px]">
      私たちの結婚式にお越しいただき<br>
      心より感謝申し上げます<br>
      皆さまと一緒にこの特別な日を<br>
      過ごせることを楽しみにしています
    </p>

    <div class="flex justify-center mb-10">
      <img
        class="w-32 h-32 sm:w-40 sm:h-40 object-cover rounded-full photo-frame"
        src="couple1.jpg"
        alt="Couple photo"
      >
    </div>

    <!-- 認証フォーム -->
    <section
      class="py-8 px-6 rounded-3xl mb-10 shadow-md"
      style="background: linear-gradient(135deg, rgb(254, 215, 170), rgb(254, 243, 199));"
    >

      <h2 class="mb-6 text-[20px] sm:text-[22px] font-bold text-amber-800">
        ゲストの皆様へメッセージ
      </h2>

      <form id="guest-form" class="space-y-5 text-left">

        <!-- 名前 -->
        <div>
          <label class="block mb-1 text-amber-700 font-medium text-sm">お名前</label>
          <input
            id="guest-name"
            type="text"
            class="w-full px-4 py-3 rounded-xl border border-amber-200 focus:ring-2 focus:ring-amber-300 text-base"
            placeholder="お名前を入力してください"
          >
        </div>

        <!-- カレンダー付き誕生日入力 -->
        <div class="relative">
          <label class="block mb-1 text-amber-700 font-medium text-sm">お誕生日</label>

          <div class="flex items-center w-full px-4 py-3 rounded-xl border border-amber-200 bg-white">
            <input
              id="guest-birthday"
              type="text"
              placeholder="誕生日（YYYY-MM-DD）"
              class="w-full focus:outline-none text-base"
            >
            <button
              id="open-calendar"
              type="button"
              class="ml-3 text-amber-600 text-2xl"
            >
              📅
            </button>
          </div>

          <!-- カレンダー本体 -->
          <div
            id="calendar-popup"
            class="absolute top-full left-0 mt-2 w-full bg-white border border-amber-200 rounded-xl shadow-lg p-4 hidden"
          >

            <div class="flex items-center justify-between mb-3">

              <!-- 年選択 -->
              <select
                id="year-select"
                class="px-2 py-1 border border-amber-300 rounded-lg text-amber-800 bg-white"
              ></select>

              <!-- 月タイトル -->
              <span id="calendar-title" class="font-medium text-amber-800"></span>

              <!-- 月移動 -->
              <div class="flex gap-4">
                <button
                  id="prev-month"
                  class="text-amber-700 text-2xl px-3 py-1 rounded-lg hover:bg-amber-100"
                >
                  ‹
                </button>

                <button
                  id="next-month"
                  class="text-amber-700 text-2xl px-3 py-1 rounded-lg hover:bg-amber-100"
                >
                  ›
                </button>
              </div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center text-sm">
              <!-- JSで日付を生成 -->
            </div>

          </div>
        </div>

        <button
          type="submit"
          class="w-full py-3 rounded-xl font-medium mt-2 text-white text-base sm:text-lg"
          style="background: linear-gradient(135deg, rgb(217, 119, 6), rgb(245, 158, 11));"
        >
          メッセージを受け取る 🌼
        </button>

        <p id="error" class="text-red-600 text-center mt-2 text-sm"></p>

      </form>
    </section>

  </div>

  <!-- 認証ロジック & カレンダーJS -->
  <script>
    /* -------------------------
   認証データ
------------------------- */
const guests = {
  "TEST": { birthday: "20000101", page: "messages/natsumi.html" },
  "山田花子": { birthday: "19950512", page: "messages/hanako.html" }
};

/* -------------------------
   カレンダーUI
------------------------- */
const birthdayInput = document.getElementById("guest-birthday");
const calendarPopup = document.getElementById("calendar-popup");
const calendarGrid = document.getElementById("calendar-grid");
const calendarTitle = document.getElementById("calendar-title");
const openCalendar = document.getElementById("open-calendar");
const prevMonth = document.getElementById("prev-month");
const nextMonth = document.getElementById("next-month");
const yearSelect = document.getElementById("year-select");

let current = new Date(2000, 0, 1);

/* 年選択の初期化 */
function initYearSelect() {
  if (yearSelect.children.length === 0) {
    for (let y = 1900; y <= 2100; y++) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      yearSelect.appendChild(opt);
    }
  }
  yearSelect.value = current.getFullYear();
}

/* カレンダー表示 */
openCalendar.addEventListener("click", (e) => {
  e.stopPropagation();
  calendarPopup.classList.toggle("hidden");
  initYearSelect();
  renderCalendar();
});

/* カレンダー内クリックは閉じない */
calendarPopup.addEventListener("click", (e) => {
  e.stopPropagation();
});

/* カレンダー外クリックで閉じる */
document.addEventListener("click", (e) => {
  if (calendarPopup.contains(e.target) || e.target === openCalendar) return;
  calendarPopup.classList.add("hidden");
});

/* カレンダー生成 */
function renderCalendar() {
  const year = parseInt(yearSelect.value);
  const month = current.getMonth();

  calendarTitle.textContent = `${month + 1}月`;
  calendarGrid.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendarGrid.innerHTML += `<div></div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    calendarGrid.innerHTML += `
      <button
        class="py-2 rounded-lg hover:bg-amber-100"
        onclick="selectDate(${year}, ${month + 1}, ${d})"
      >
        ${d}
      </button>
    `;
  }
}

/* ★ フォーム誤タップ防止 */
function temporarilyDisableForm() {
  const form = document.getElementById("guest-form");
  form.style.pointerEvents = "none";
  setTimeout(() => {
    form.style.pointerEvents = "auto";
  }, 150);
}

/* ★ 日付選択（誤タップ防止入り） */
function selectDate(y, m, d) {
  const mm = String(m).padStart(2, "0");
  const dd = String(d).padStart(2, "0");
  birthdayInput.value = `${y}-${mm}-${dd}`;

  // タッチ貫通防止
  calendarPopup.style.pointerEvents = "none";
  temporarilyDisableForm();

  calendarPopup.classList.add("hidden");

  setTimeout(() => {
    calendarPopup.style.pointerEvents = "auto";
  }, 150);
}

/* 月移動 */
prevMonth.addEventListener("click", (e) => {
  e.stopPropagation();
  current.setMonth(current.getMonth() - 1);
  yearSelect.value = current.getFullYear();
  renderCalendar();
});

nextMonth.addEventListener("click", (e) => {
  e.stopPropagation();
  current.setMonth(current.getMonth() + 1);
  yearSelect.value = current.getFullYear();
  renderCalendar();
});

/* 年変更 */
yearSelect.addEventListener("change", (e) => {
  e.stopPropagation();
  current.setFullYear(parseInt(yearSelect.value));
  renderCalendar();
});

/* -------------------------
   認証処理
------------------------- */
document.getElementById('guest-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('guest-name').value.trim();
  const birthdayRaw = birthdayInput.value;
  const error = document.getElementById('error');

  const birthday = birthdayRaw.replaceAll("-", "");

  if (guests[name] && guests[name].birthday === birthday) {
    window.location.href = guests[name].page;
  } else {
    error.textContent = "認証に失敗しました。入力内容をご確認ください。";
  }
});
  </script>

</body>
</html>
