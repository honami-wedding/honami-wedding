<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- ★スマホ最適化 -->
  <title>Wedding Guest Message</title>

  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(180deg, #ffe8d6 0%, #fffaf5 35%, #e8f4ff 100%);
      background-attachment: fixed;
    }

    .photo-frame {
      border: 4px solid #fff;
      box-shadow: 0 8px 32px rgba(180,83,9,0.3);
    }
  </style>
</head>

<body class="min-h-screen w-full">

  <!-- Hero Section -->
  <section class="relative w-full h-[45vh] sm:h-[50vh] overflow-hidden">
    <img class="absolute inset-0 w-full h-full object-cover"
         src="https://images.pexels.com/photos/28689259/pexels-photo-28689259.jpeg"
         alt="Orange dahlias">
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-white/40 to-white"></div>
  </section>

  <!-- Main Content -->
  <div class="max-w-xl mx-auto px-5 -mt-14 relative z-10 text-center pb-16">

    <h1 class="mb-1 text-[28px] sm:text-[32px] text-amber-800">Rintaro & Honami</h1>
    <p class="tracking-[0.25em] mb-6 text-amber-600 font-medium text-sm sm:text-base">2026.10.11</p>

    <p class="leading-relaxed mb-10 text-amber-900 text-[15px] sm:text-[16px]">
      私たちの結婚式にお越しいただき<br>
      心より感謝申し上げます。<br>
      皆さまと一緒にこの特別な日を<br>
      過ごせることを楽しみにしています。
    </p>

    <div class="flex justify-center mb-10">
      <img class="w-32 h-32 sm:w-40 sm:h-40 object-cover rounded-full photo-frame"
           src="couple1.jpg"
           alt="Couple photo">
    </div>

    <!-- 認証フォーム -->
