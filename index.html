<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲスト専用ページ認証</title>
<style>
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    margin: 0;
    padding: 40px 20px;
    text-align: center;
    color: #555;

    /* ▼▼ ふんわり可愛いオレンジ×青グラデーション ▼▼ */
    background: linear-gradient(
      180deg,
      #ffe8d6 0%,   /* 淡いオレンジ */
      #fff5ee 30%,  /* ふんわり白 */
      #e8f4ff 100%  /* 淡い青 */
    );
    background-attachment: fixed;
    /* ▲▲ グラデーションここまで ▲▲ */

    animation: fadeIn 1.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 以下はそのまま使える（前のコードと同じ） */
</style>
</head>
<body>

<h1>ゲスト専用ページへようこそ</h1>
<p>お名前とお誕生日を入力してください</p>

<div class="box">
<input id="name" type="text" placeholder="お名前（例：田中太郎）">
<input id="birthday" type="text" placeholder="誕生日（例：19900101）">
<button onclick="auth()">認証する</button>
<div id="error" class="error"></div>
</div>

<script>
// ★ ゲスト情報をここに追加していく ★
const guests = {
"田中太郎": { birthday: "19900101", page: "massages/natsumi.html" },
"山田花子": { birthday: "19950512", page: "messages/hanako.html" }
};

function auth() {
const name = document.getElementById("name").value.trim();
const birthday = document.getElementById("birthday").value.trim();
const error = document.getElementById("error");

if (guests[name] && guests[name].birthday === birthday) {
window.location.href = guests[name].page;
} else {
error.textContent = "認証に失敗しました。入力内容をご確認ください。";
}
}
</script>

</body>
</html>
