<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wedding Guest Message</title>

  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(180deg, #ffe8d6 0%, #fffaf5 35%, #e8f4ff 100%);
      background-attachment: fixed;
    }

    .photo-frame {
      border: 4px solid #ffffff;
      box-shadow: 0 8px 32px rgba(30,58,95,0.25);
    }
  </style>
</head>

<body class="min-h-screen w-full">

  <!-- Hero Section（1番目の写真に変更） -->
  <section class="relative w-full h-[45vh] sm:h-[50vh] overflow-hidden">
    <img
      class="absolute inset-0 w-full h-full object-cover"
      src="https://images.pexels.com/photos/10013403/pexels-photo-10013403.jpeg?auto=compress&cs=tinysrgb&w=1280"
      alt="Blue hydrangeas elegantly arranged in a white vase"
    >
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-white/40 to-white"></div>
  </section>

  <!-- Main Content -->
  <div class="max-w-xl mx-auto px-5 -mt-14 relative z-10 text-center pb-16">

    <h1 class="mb-1 text-[28px] sm:text-[32px] text-sky-900">Rintaro & Honami</h1>
    <p class="tracking-[0.25em] mb-6 text-sky-600 font-medium text-sm sm:text-base">
      2026.10.11
    </p>

    <p class="leading-relaxed mb-10 text-sky-900 text-[15px] sm:text-[16px]">
      私たちの結婚式にお越しいただき<br>
      心より感謝申し上げます<br>
      皆さまと一緒にこの特別な日を<br>
      過ごせることを楽しみにしています
    </p>

    <!-- 丸写真（1番目の写真に変更） -->
    <div class="flex justify-center mb-10">
      <img
        class="w-32 h-32 sm:w-40 sm:h-40 object-cover rounded-full photo-frame"
        src="https://images.pexels.com/photos/13631679/pexels-photo-13631679.jpeg?auto=compress&cs=tinysrgb&w=800"
        alt="Couple photo"
      >
    </div>

    <!-- 認証フォーム（色を1番目の世界観に統合） -->
    <section
      class="py-8 px-6 rounded-3xl mb-10 shadow-md"
      style="background: linear-gradient(135deg, rgb(219, 234, 254), rgb(240, 249, 255));"
    >

      <h2 class="mb-6 text-[20px] sm:text-[22px] font-bold text-sky-900">
        ゲストの皆様へメッセージ
      </h2>

      <form id="guest-form" class="space-y-5 text-left">

        <!-- 名前 -->
        <div>
          <label class="block mb-1 text-sky-800 font-medium text-sm">お名前</label>
          <input
            id="guest-name"
            type="text"
            class="w-full px-4 py-3 rounded-xl border border-sky-200 focus:ring-2 focus:ring-sky-300 text-base"
            placeholder="お名前を入力してください"
          >
        </div>

        <!-- カレンダー付き誕生日入力 -->
        <div class="relative">
          <label class="block mb-1 text-sky-800 font-medium text-sm">お誕生日</label>

          <div class="flex items-center w-full px-4 py-3 rounded-xl border border-sky-200 bg-white">
            <input
              id="guest-birthday"
              type="text"
              placeholder="誕生日（YYYY-MM-DD）"
              class="w-full focus:outline-none text-base"
            >
            <button
              id="open-calendar"
              type="button"
              class="ml-3 text-sky-600 text-2xl"
            >
              📅
            </button>
          </div>

          <!-- カレンダー本体 -->
          <div
            id="calendar-popup"
            class="absolute top-full left-0 mt-2 w-full bg-white border border-sky-200 rounded-xl shadow-lg p-4 hidden"
          >

            <div class="flex items-center justify-between mb-3">

              <!-- 年選択 -->
              <select
                id="year-select"
                class="px-2 py-1 border border-sky-300 rounded-lg text-sky-800 bg-white"
              ></select>

              <!-- 月タイトル -->
              <span id="calendar-title" class="font-medium text-sky-800"></span>

              <!-- 月移動 -->
              <div class="flex gap-4">
                <button
                  id="prev-month"
                  class="text-sky-700 text-2xl px-3 py-1 rounded-lg hover:bg-sky-100"
                >
                  ‹
                </button>

                <button
                  id="next-month"
                  class="text-sky-700 text-2xl px-3 py-1 rounded-lg hover:bg-sky-100"
                >
                  ›
                </button>
              </div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center text-sm">
              <!-- JSで日付を生成 -->
            </div>

          </div>
        </div>

        <button
  type="submit"
  class="w-full py-3 rounded-xl font-medium mt-2 text-white text-base sm:text-lg"
  style="background: linear-gradient(135deg, #A7D8FF, #CFEAFF);"
>
  メッセージを受け取る 🌼
</button>


        <p id="error" class="text-red-600 text-center mt-2 text-sm"></p>

      </form>
    </section>

  </div>

  <!-- JS（機能部分はそのまま） -->
  <script>
    const guests = {
      "TEST": { birthday: "20000101", page: "messages/natsumi.html" },
      "TEST2": { birthday: "20000101", page: "messages/mirai.html" }
    };

    const birthdayInput = document.getElementById("guest-birthday");
    const calendarPopup = document.getElementById("calendar-popup");
    const calendarGrid = document.getElementById("calendar-grid");
    const calendarTitle = document.getElementById("calendar-title");
    const openCalendar = document.getElementById("open-calendar");
    const prevMonth = document.getElementById("prev-month");
    const nextMonth = document.getElementById("next-month");
    const yearSelect = document.getElementById("year-select");

    let current = new Date();

    function initYearSelect() {
      if (yearSelect.children.length === 0) {
        for (let y = 1950; y <= 2050; y++) {
          const opt = document.createElement("option");
          opt.value = y;
          opt.textContent = y;
          yearSelect.appendChild(opt);
        }
      }
      yearSelect.value = current.getFullYear();
    }

    openCalendar.addEventListener("click", (e) => {
      e.stopPropagation();
      calendarPopup.classList.toggle("hidden");
      initYearSelect();
      renderCalendar();
    });

    calendarPopup.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    document.addEventListener("pointerdown", (e) => {
      if (calendarPopup.contains(e.target) || e.target === openCalendar) return;
      calendarPopup.classList.add("hidden");
    });

    function renderCalendar() {
      const year = parseInt(yearSelect.value);
      const month = current.getMonth();

      calendarTitle.textContent = `${month + 1}月`;
      calendarGrid.innerHTML = "";

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        calendarGrid.innerHTML += `<div></div>`;
      }

      for (let d = 1; d <= lastDate; d++) {
        calendarGrid.innerHTML += `
          <button
            class="py-2 rounded-lg hover:bg-sky-100"
            onclick="selectDate(${year}, ${month + 1}, ${d})"
          >
            ${d}
          </button>
        `;
      }
    }

    function temporarilyDisableForm() {
      const form = document.getElementById("guest-form");
      form.style.pointerEvents = "none";
      setTimeout(() => {
        form.style.pointerEvents = "auto";
      }, 150);
    }

    function selectDate(y, m, d) {
      const mm = String(m).padStart(2, "0");
      const dd = String(d).padStart(2, "0");
      birthdayInput.value = `${y}-${mm}-${dd}`;

      calendarPopup.style.pointerEvents = "none";
      temporarilyDisableForm();

      calendarPopup.classList.add("hidden");

      setTimeout(() => {
        calendarPopup.style.pointerEvents = "auto";
      }, 150);
    }

    prevMonth.addEventListener("click", (e) => {
      e.stopPropagation();
      current.setMonth(current.getMonth() - 1);
      yearSelect.value = current.getFullYear();
      renderCalendar();
    });

    nextMonth.addEventListener("click", (e) => {
      e.stopPropagation();
      current.setMonth(current.getMonth() + 1);
      yearSelect.value = current.getFullYear();
      renderCalendar();
    });

    yearSelect.addEventListener("change", (e) => {
      e.stopPropagation();
      current.setFullYear(parseInt(yearSelect.value));
      renderCalendar();
    });

    document.getElementById("guest-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("guest-name").value.trim();
      const birthdayRaw = birthdayInput.value;
      const error = document.getElementById("error");

      const birthday = birthdayRaw.replaceAll("-", "");

      if (guests[name] && guests[name].birthday === birthday) {
        window.location.href = guests[name].page;
      } else {
        error.textContent = "認証に失敗しました。入力内容をご確認ください。";
      }
    });
  </script>

</body>
</html>
